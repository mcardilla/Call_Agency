<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Call - Sistema Privado</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .video-full { width: 100vw; height: 100vh; object-fit: cover; }
        .controls-transition { transition: opacity 0.5s ease-in-out; }
        .hidden-controls { opacity: 0; pointer-events: none; }
        .visible-controls { opacity: 1; }
    </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">

    <!-- Pantalla de Bienvenida -->
    <div id="splash-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black">
        <h1 id="text-welcome" class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-500 to-indigo-500">WELCOME</h1>
        <div id="quiz-container" class="hidden flex flex-col items-center">
            <h2 class="text-2xl font-bold mb-6">Ready to have fun?</h2>
            <button onclick="handleIntroChoice(true)" class="px-10 py-3 bg-indigo-600 rounded-full font-bold active:scale-95">YES</button>
        </div>
    </div>

    <!-- Login -->
    <div id="main-app" class="hidden fixed inset-0 flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass bg-white/10 backdrop-blur-lg p-8 rounded-3xl border border-white/10">
            <input type="text" id="sala" class="w-full bg-black/50 p-4 rounded-xl mb-4 border border-white/10" value="sala1" placeholder="Sala">
            <input type="text" id="usuario" class="w-full bg-black/50 p-4 rounded-xl mb-4 border border-white/10" placeholder="Tu nombre">
            <button onclick="entrarALallamada()" class="w-full py-4 bg-purple-600 rounded-xl font-bold">ENTRAR</button>
        </div>
    </div>

    <!-- Interfaz de Llamada -->
    <div id="call-interface" class="hidden relative w-screen h-screen bg-black">
        <div id="remote-video" class="w-full h-full"></div>
        <div id="local-video" class="absolute bottom-24 right-4 w-32 h-48 bg-gray-800 rounded-2xl border-2 border-white/20 overflow-hidden z-10 shadow-2xl"></div>
        
        <!-- Temporizador (Siempre visible) -->
        <div class="absolute top-6 left-0 right-0 text-center z-20">
            <span id="timer" class="bg-black/50 backdrop-blur px-4 py-1 rounded-full font-mono text-sm font-bold border border-white/10">00:00</span>
        </div>

        <!-- Controles que aparecen al tocar -->
        <div id="controls-ui" class="absolute bottom-0 w-full p-8 flex justify-center z-30 controls-transition hidden-controls">
            <button onclick="location.reload()" class="bg-red-600 hover:bg-red-700 px-8 py-3 rounded-full font-bold shadow-xl transition-all active:scale-90">
                CORTAR LLAMADA
            </button>
        </div>
    </div>

<script>
    const USUARIO_MONITOR_SECRETO = "AdminMonitor";
    const APP_ID = "93fa29881aa549dcb627df6e7865b88c";
    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    
    let timerInterval;
    let seconds = 0;
    let timerStarted = false;

    // Lógica UI
    document.body.addEventListener('click', () => {
        const ui = document.getElementById('controls-ui');
        ui.classList.remove('hidden-controls');
        ui.classList.add('visible-controls');
        setTimeout(() => {
            ui.classList.remove('visible-controls');
            ui.classList.add('hidden-controls');
        }, 7000);
    });

    function startTimer() {
        if (timerStarted) return;
        timerStarted = true;
        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }, 1000);
    }

    // Flujo inicio
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.getElementById('text-welcome').style.display = 'none';
            document.getElementById('quiz-container').classList.remove('hidden');
        }, 2000);
    });

    function handleIntroChoice(ready) {
        if(!ready) return;
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('main-app').classList.remove('hidden');
    }

    async function entrarALallamada() {
        const canalNombre = document.getElementById("sala").value;
        const usuarioNombre = document.getElementById("usuario").value;
        const isMonitor = (usuarioNombre === USUARIO_MONITOR_SECRETO);

        await client.join(APP_ID, canalNombre, null, null);
        document.getElementById("main-app").style.display = 'none';
        document.getElementById("call-interface").classList.remove('hidden');

        if (!isMonitor) {
            const audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
            const videoTrack = await AgoraRTC.createCameraVideoTrack();
            videoTrack.play('local-video');
            await client.publish([audioTrack, videoTrack]);
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "video") {
                user.videoTrack.play('remote-video');
                // Si es un usuario normal (no monitor), inicia el conteo
                if (!isMonitor) startTimer();
            }
            if (mediaType === "audio") user.audioTrack.play();
        });
    }
</script>
</body>
</html>

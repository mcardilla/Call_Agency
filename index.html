<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Call - Sistema Privado</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .controls-transition { transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; }
        .hidden-controls { opacity: 0; pointer-events: none; transform: translateY(20px); }
        .visible-controls { opacity: 1; transform: translateY(0); }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .animate-pulse-slow { animation: pulse-slow 2s infinite; }
        /* Forzar a que los videos de Agora ocupen el 100% de sus contenedores */
        .agora-video-player div, .agora-video-player video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body class="bg-[#05070c] text-white font-sans overflow-hidden select-none">

    <div id="splash-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#05070c] p-6 text-center">
        <h1 id="text-welcome" class="text-5xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-purple-500 via-indigo-400 to-pink-500 transition-all duration-1000">
            WELCOME
        </h1>

        <div id="quiz-container" class="hidden flex flex-col items-center space-y-6">
            <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-gray-200">Ready to have fun?</h2>
            <button onclick="goToProfileSelection()" class="w-48 py-3.5 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-full font-bold shadow-lg shadow-indigo-500/20 active:scale-95 transition">
                YES
            </button>
        </div>

        <div id="profile-container" class="hidden flex flex-col items-center space-y-6 w-full max-w-xs">
            <h2 class="text-xl font-semibold tracking-wide text-gray-400 text-xs uppercase">Select your profile</h2>
            <div class="flex flex-col space-y-3 w-full">
                <button onclick="selectProfile('hombre')" class="w-full py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl font-medium tracking-wide active:scale-98 transition">
                    Hombre ♂️
                </button>
                <button onclick="selectProfile('mujer')" class="w-full py-4 bg-gradient-to-r from-pink-600 to-purple-600 font-bold tracking-wide rounded-2xl shadow-lg shadow-pink-500/10 active:scale-98 transition">
                    Mujer ♀️
                </button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden fixed inset-0 flex flex-col items-center justify-center p-6 z-40">
        <div class="w-full max-w-sm bg-white/[0.03] backdrop-blur-xl p-8 rounded-3xl border border-white/10 shadow-2xl space-y-5">
            <div class="text-center mb-2">
                <h2 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-400">BRIDGE CALL</h2>
                <p id="badge-perfil" class="text-[10px] text-purple-400 font-bold tracking-widest uppercase mt-1"></p>
            </div>
            <div>
                <input type="text" id="sala" class="w-full bg-black/40 p-4 rounded-xl border border-white/5 focus:outline-none focus:border-purple-500 font-medium transition text-sm" value="sala1" placeholder="Nombre de la sala">
            </div>
            <div>
                <input type="text" id="usuario" class="w-full bg-black/40 p-4 rounded-xl border border-white/5 focus:outline-none focus:border-purple-500 font-medium transition text-sm" placeholder="Tu nombre de usuario">
            </div>
            <button onclick="entrarALallamada()" class="w-full py-4 bg-gradient-to-r from-purple-600 to-pink-600 rounded-xl font-bold tracking-wide text-sm shadow-xl active:scale-95 transition">
                CONECTAR
            </button>
        </div>
    </div>

    <div id="call-interface" class="hidden relative w-screen h-screen bg-black">
        
        <div id="remote-video-main" class="absolute inset-0 w-full h-full z-0 agora-video-player"></div>
        
        <div id="remote-video-secondary" onclick="swapRemoteVideos(event)" class="hidden absolute top-20 right-4 w-28 h-40 bg-gray-900 rounded-2xl border border-white/20 overflow-hidden z-20 shadow-2xl agora-video-player active:scale-95 transition-transform"></div>
        
        <div id="local-video-container" class="absolute bottom-28 right-4 w-28 h-40 bg-gray-900 rounded-2xl border border-white/10 overflow-hidden z-10 shadow-2xl agora-video-player"></div>
        
        <div class="absolute top-2 left-1/2 -translate-x-1/2 z-50 pointer-events-none">
            <div class="flex items-center space-x-1.5 bg-black/60 backdrop-blur-md px-3 py-1 rounded-full border border-white/10 shadow-lg">
                <div id="live-indicator" class="w-1.5 h-1.5 bg-gray-500 rounded-full"></div>
                <span id="timer" class="font-mono text-xs font-bold tracking-wider text-gray-400">00:00</span>
            </div>
        </div>

        <div id="controls-ui" class="absolute bottom-6 left-0 right-0 px-4 flex justify-center items-center gap-3 z-30 controls-transition hidden-controls">
            <button onclick="location.reload()" class="bg-red-500 hover:bg-red-600 px-6 py-3.5 rounded-2xl font-bold text-xs tracking-wider shadow-lg active:scale-90 transition">
                CORTAR LLAMADA
            </button>
            <button id="btn-start-timer" onclick="startTimer(event)" class="hidden bg-emerald-600 hover:bg-emerald-700 px-6 py-3.5 rounded-2xl font-bold text-xs tracking-wider shadow-lg active:scale-90 transition flex items-center gap-2">
                ⏱️ INICIAR TIEMPO
            </button>
        </div>
    </div>

<script>
    // CONFIGURACIÓN CLAVE MANTENIDA
    const USUARIO_MONITOR_SECRETO = "536092";
    const APP_ID = "93fa29881aa549dcb627df6e7865b88c";
    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    
    let selectedProfile = '';
    let timerInterval;
    let seconds = 0;
    let timerStarted = false;
    let uiTimeout;

    let mainRemoteUser = null;
    let secondaryRemoteUser = null;

    // Mostrar/Ocultar controles al tocar la pantalla
    document.body.addEventListener('click', () => {
        if(document.getElementById('call-interface').classList.contains('hidden')) return;
        
        const ui = document.getElementById('controls-ui');
        ui.classList.remove('hidden-controls');
        ui.classList.add('visible-controls');
        
        clearTimeout(uiTimeout);
        uiTimeout = setTimeout(() => {
            ui.classList.remove('visible-controls');
            ui.classList.add('hidden-controls');
        }, 7000);
    });

    // Flujo inicial
    window.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.getElementById('text-welcome').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('text-welcome').style.display = 'none';
                document.getElementById('quiz-container').classList.remove('hidden');
            }, 1000);
        }, 2000);
    });

    function goToProfileSelection() {
        document.getElementById('quiz-container').style.display = 'none';
        document.getElementById('profile-container').classList.remove('hidden');
    }

    function selectProfile(profile) {
        selectedProfile = profile;
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('main-app').classList.remove('hidden');
        document.getElementById('badge-perfil').innerText = `Perfil: ${profile}`;
    }

    function startTimer(e) {
        if(e) e.stopPropagation(); 
        if (timerStarted) return;
        timerStarted = true;
        
        document.getElementById('timer').classList.replace('text-gray-400', 'text-emerald-400');
        document.getElementById('live-indicator').classList.replace('bg-gray-500', 'bg-emerald-500');
        document.getElementById('live-indicator').classList.add('animate-pulse-slow');
        document.getElementById('btn-start-timer').style.display = 'none';

        timerInterval = setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').innerText = `${mins}:${secs}`;
        }, 1000);
    }

    // Intercambio de pantallas para Monitoreo
    function swapRemoteVideos(e) {
        if(e) e.stopPropagation(); 
        if (!mainRemoteUser || !secondaryRemoteUser) return;

        let temp = mainRemoteUser;
        mainRemoteUser = secondaryRemoteUser;
        secondaryRemoteUser = temp;

        document.getElementById('remote-video-main').innerHTML = "";
        mainRemoteUser.videoTrack.play('remote-video-main');

        document.getElementById('remote-video-secondary').innerHTML = "";
        secondaryRemoteUser.videoTrack.play('remote-video-secondary');
    }

    async function entrarALallamada() {
        const canalNombre = document.getElementById("sala").value.trim().toLowerCase();
        const usuarioNombre = document.getElementById("usuario").value.trim();

        if (!canalNombre || !usuarioNombre) {
            alert("Por favor completa los datos.");
            return;
        }

        const esMonitorSecreto = (selectedProfile === 'mujer' && usuarioNombre === USUARIO_MONITOR_SECRETO);

        // ========================================================================
        // 🔥 CORRECCIÓN CRÍTICA: ENCENDER RECEPTORES ANTES DE REALIZAR EL JOIN 🔥
        // ========================================================================
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            
            if (mediaType === "video") {
                if (!mainRemoteUser) {
                    mainRemoteUser = user;
                    document.getElementById('remote-video-main').innerHTML = "";
                    user.videoTrack.play('remote-video-main');
                } else if (!secondaryRemoteUser) {
                    secondaryRemoteUser = user;
                    const secContainer = document.getElementById('remote-video-secondary');
                    secContainer.classList.remove('hidden');
                    secContainer.innerHTML = "";
                    user.videoTrack.play('remote-video-secondary');
                }
            }
            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        client.on("user-left", (user) => {
            if (mainRemoteUser && mainRemoteUser.uid === user.uid) {
                mainRemoteUser = null;
                document.getElementById('remote-video-main').innerHTML = "";
                
                if (secondaryRemoteUser) {
                    mainRemoteUser = secondaryRemoteUser;
                    secondaryRemoteUser = null;
                    document.getElementById('remote-video-secondary').classList.add('hidden');
                    document.getElementById('remote-video-secondary').innerHTML = "";
                    mainRemoteUser.videoTrack.play('remote-video-main');
                }
            } else if (secondaryRemoteUser && secondaryRemoteUser.uid === user.uid) {
                secondaryRemoteUser = null;
                document.getElementById('remote-video-secondary').classList.add('hidden');
                document.getElementById('remote-video-secondary').innerHTML = "";
            }
        });
        // ========================================================================

        // Ahora sí, unirse de forma segura sin perder transmisiones previas
        await client.join(APP_ID, canalNombre, null, null);
        document.getElementById("main-app").style.display = 'none';
        document.getElementById("call-interface").classList.remove('hidden');

        if (esMonitorSecreto) {
            document.getElementById('local-video-container').style.display = 'none';
            console.log("Modo Monitoreo Invisible activado.");
        } else {
            try {
                const audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                const videoTrack = await AgoraRTC.createCameraVideoTrack();
                
                videoTrack.play('local-video-container');
                await client.publish([audioTrack, videoTrack]);

                if (selectedProfile === 'mujer') {
                    document.getElementById('btn-start-timer').classList.remove('hidden');
                    document.getElementById('btn-start-timer').style.display = 'flex';
                }
            } catch (e) {
                alert("Activa los permisos de cámara en tu navegador.");
            }
        }
    }
</script>
</body>
</html>

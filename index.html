<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bridge Call - Sistema Privado</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #121212 !important; 
            color: #ffffff !important; 
            margin: 0; 
            padding: 20px; 
            text-align: center; 
        }
        .setup-box { 
            background-color: #1e1e1e !important; 
            padding: 30px 20px; 
            border-radius: 12px; 
            margin: 30px auto; 
            max-width: 400px;
            border: 1px solid #333;
            display: block !important;
        }
        input, select, button { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            border-radius: 8px; 
            border: 1px solid #444; 
            box-sizing: border-box; 
            font-size: 16px; 
            display: block !important;
        }
        input, select { 
            background-color: #2a2a2a !important; 
            color: #ffffff !important; 
        }
        button { 
            background-color: #007bff !important; 
            color: #ffffff !important; 
            font-weight: bold; 
            cursor: pointer; 
            border: none;
        }
        button:hover { 
            background-color: #0056b3 !important; 
        }
        .grid-videos { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 10px; 
            margin-top: 20px; 
        }
        .video-container { 
            background: #000; 
            height: 220px; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
            border: 1px solid #333; 
        }
        .nombre-usuario { 
            position: absolute; 
            bottom: 8px; 
            left: 8px; 
            background: rgba(0,0,0,0.6); 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 12px; 
            z-index: 10; 
        }
    </style>
</head>
<body>

    <h2 style="margin-top: 20px;">Bridge Call System</h2>

    <div id="formulario" class="setup-box">
        <label style="display:block; text-align:left; margin-bottom:5px; font-size:14px; color:#aaa;">Nombre de la sala:</label>
        <input type="text" id="sala" placeholder="Ej: sala1" value="sala1">
        
        <label style="display:block; text-align:left; margin-bottom:5px; font-size:14px; color:#aaa;">Tu nombre de usuario:</label>
        <input type="text" id="usuario" placeholder="Escribe tu nombre aquí">
        
        <label style="display:block; text-align:left; margin-bottom:5px; font-size:14px; color:#aaa;">Selecciona tu rol:</label>
        <select id="rol">
            <option value="invitado">Soy Invitado (Transmitir Video)</option>
            <option value="fantasma">Soy Administrador (Modo Fantasma)</option>
        </select>
        
        <button onclick="entrarALallamada()">Entrar a la Videollamada</button>
    </div>

    <div id="grilla-videos" class="grid-videos" style="display: none;"></div>

<script>
    const APP_ID = "B900d72315c5422d8ca5ced3d60e94d1"; 
    const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
    let canalesLocales = { videoTrack: null, audioTrack: null };

    async function entrarALallamada() {
        const canalNombre = document.getElementById("sala").value.trim().toLowerCase();
        const usuarioNombre = document.getElementById("usuario").value.trim();
        const rolSeleccionado = document.getElementById("rol").value;

        if (!canalNombre || !usuarioNombre) {
            alert("Por favor introduce tu nombre y el de la sala.");
            return;
        }

        try {
            // Intentamos conectarnos a Agora. Pasamos null en el ID para evitar fallos de texto en móviles.
            await client.join(APP_ID, canalNombre, null, null);
            
            // Si conecta bien, hacemos el cambio de pantalla
            document.getElementById("formulario").style.display = "none";
            document.getElementById("grilla-videos").style.display = "grid";

            if (rolSeleccionado === "fantasma") {
                alert("👻 Modo Fantasma Activo. Estás dentro de la sala de forma invisible.");
            } else {
                try {
                    canalesLocales.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                    canalesLocales.videoTrack = await AgoraRTC.createCameraVideoTrack();

                    const miContenedor = document.createElement("div");
                    miContenedor.id = "local-user-container";
                    miContenedor.className = "video-container";
                    miContenedor.innerHTML = `<div class="nombre-usuario">${usuarioNombre} (Tú)</div>`;
                    document.getElementById("grilla-videos").appendChild(miContenedor);
                    
                    canalesLocales.videoTrack.play(miContenedor);
                    await client.publish([canalesLocales.audioTrack, canalesLocales.videoTrack]);
                } catch (mediaError) {
                    alert("⚠️ ERROR DE CÁMARA O MICRÓFONO:\n\n" + mediaError.message + "\n\nPor favor, asegúrate de presionar 'Permitir' cuando el navegador te pida usar la cámara.");
                }
            }
        } catch (error) {
            alert("❌ ERROR DE CONEXIÓN AGORA:\n\n" + error.message + "\n\nEsto ocurre si el App ID está mal copiado o si tu proyecto de Agora exige un Token obligatorio.");
        }

        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);

            if (mediaType === "video") {
                let contenedorRemoto = document.getElementById(user.uid);
                if (!contenedorRemoto) {
                    contenedorRemoto = document.createElement("div");
                    contenedorRemoto.id = user.uid;
                    contenedorRemoto.className = "video-container";
                    contenedorRemoto.innerHTML = `<div class="nombre-usuario">Usuario Conectado</div>`;
                    document.getElementById("grilla-videos").appendChild(contenedorRemoto);
                }
                user.videoTrack.play(contenedorRemoto);
            }

            if (mediaType === "audio") {
                user.audioTrack.play();
            }
        });

        const removerUsuario = (user) => {
            const contenedor = document.getElementById(user.uid);
            if (contenedor) contenedor.remove();
        };
        client.on("user-unordered", removerUsuario);
        client.on("user-left", removerUsuario);
    }
</script>
</body>
</html>
